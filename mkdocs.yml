site_name: "Librairie des Standards"
site_description: "Portail officiel des procédures DECADE-X"
site_url: "https://shibukawa310.github.io/dx_standards/"

theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.instant
    - search.suggest
    - search.highlight
    - navigation.tracking

extra_css:
  - assets/custom.css

plugins:
  - search
  - tags         # Permet d'ajouter des mots-clés dans le frontmatter
  - macros:      # On garde notre plugin de variables qui fonctionne
      include_dir: includes

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - abbr
  - pymdownx.snippets:
      base_path: ["includes"]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
